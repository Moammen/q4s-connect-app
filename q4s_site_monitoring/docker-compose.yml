services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: q4s_site_monitoring_web

    command: ["sh", "-c", "python manage.py migrate && python manage.py createsuperuser --noinput || true && python manage.py runserver 0.0.0.0:8008"]

    ports:
      - "1887:8008"

    volumes:
      - .:/app

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      DJANGO_SETTINGS_MODULE: q4s_site_monitoring.settings

      POSTGRES_HOST: postgres
      POSTGRES_DB: mydb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_PORT: 5432

      DJANGO_SUPERUSER_USERNAME: admin
      DJANGO_SUPERUSER_EMAIL: admin@example.com
      DJANGO_SUPERUSER_PASSWORD: 123456789

    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: q4s_site_monitoring_postgres

    ports:
      - "5433:5432"

    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mydb"]
      interval: 10s
      timeout: 5s
      retries: 5

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

volumes:
  postgres_data: